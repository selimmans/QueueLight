<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — Queue Light</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .logo {
      font-family: "DM Serif Display", serif;
      font-size: 1.6rem;
      color: #111;
      margin-bottom: 0.2rem;
      text-align: center;
    }

    .sub {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #a1a1aa;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #71717a;
      margin-bottom: 0.4rem;
    }

    input[type="tel"] {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid #e4e4e7;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #18181b;
      background: #fff;
      -webkit-appearance: none;
      appearance: none;
      margin-bottom: 1rem;
    }

    input:focus { outline: none; border-color: #111; }

    select {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid #e4e4e7;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #18181b;
      background: #fff;
      -webkit-appearance: none;
      appearance: none;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #111; }

    .phone-wrap {
      display: flex;
      align-items: stretch;
      border: 1.5px solid #e4e4e7;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }

    .phone-wrap:focus-within { border-color: #111; }

    .phone-prefix {
      padding: 0.7rem 0.75rem 0.7rem 0.85rem;
      font-size: 0.95rem;
      color: #71717a;
      background: #f4f4f5;
      border-right: 1.5px solid #e4e4e7;
      white-space: nowrap;
      user-select: none;
    }

    .phone-wrap input {
      border: none;
      border-radius: 0;
      margin-bottom: 0;
      background: transparent;
      flex: 1;
      padding: 0.7rem 0.85rem;
      font-size: 0.95rem;
      color: #18181b;
    }

    .phone-wrap input:focus { outline: none; }

    .sign-in-btn {
      width: 100%;
      padding: 0.8rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    .sign-in-btn:active { opacity: 0.85; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 0.65rem 0.75rem;
      color: #dc2626;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="logo">Queue Light</div>
  <div class="sub">Staff access</div>

  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}

      <label for="biz_slug">Business</label>
      <select id="biz_slug" name="slug" required>
        <option value="">— select —</option>
        {% for biz, code in businesses_with_codes %}
        <option value="{{ biz.slug }}" data-code="{{ code }}"{% if biz.slug == selected_slug %} selected{% endif %}>{{ biz.name }}</option>
        {% endfor %}
      </select>

      <label for="id_phone">Your phone number</label>
      <div class="phone-wrap">
        <span class="phone-prefix" id="phone_prefix">+1</span>
        <input type="tel" id="id_phone" name="phone"
               autocomplete="tel" placeholder="416 555 0100" required>
      </div>

      <button class="sign-in-btn" type="submit">Sign in</button>
    </form>
  </div>

  <script>
    const sel = document.getElementById("biz_slug");
    const pfx = document.getElementById("phone_prefix");

    function updatePrefix() {
      const opt = sel.options[sel.selectedIndex];
      pfx.textContent = opt && opt.dataset.code ? "+" + opt.dataset.code : "+1";
    }

    sel.addEventListener("change", updatePrefix);
    updatePrefix();
  </script>
</body>
</html>
