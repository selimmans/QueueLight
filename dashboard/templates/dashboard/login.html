<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — {{ business.name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
    }

    .header {
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-bottom: 2rem;
    }

    .accent-bar {
      height: 6px;
      border-radius: 3px;
      background: {{ business.logo_colour }};
      margin-bottom: 1.25rem;
    }

    .business-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #111;
    }

    .subtitle {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #666;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.35rem;
    }

    input[type="tel"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      color: #111;
      background: #fafafa;
      -webkit-appearance: none;
      margin-bottom: 1.25rem;
    }

    input:focus {
      outline: none;
      border-color: {{ business.logo_colour }};
      background: #fff;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #dc2626;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.875rem;
      background: {{ business.logo_colour }};
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button[type="submit"]:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="header">
    <div class="accent-bar"></div>
    <div class="business-name">{{ business.name }}</div>
    <div class="subtitle">Staff access</div>
  </div>

  <div class="card">
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_phone">Your registered phone number</label>
      <input type="tel" id="id_phone" name="phone" autocomplete="tel"
             placeholder="+1 613 555 0100" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
