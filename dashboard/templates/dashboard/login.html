<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — Queue Light</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .logo {
      font-family: "DM Serif Display", serif;
      font-size: 1.6rem;
      color: #111;
      margin-bottom: 0.2rem;
      text-align: center;
    }

    .sub {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #a1a1aa;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #71717a;
      margin-bottom: 0.4rem;
    }

    input[type="tel"] {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid #e4e4e7;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #18181b;
      background: #fff;
      -webkit-appearance: none;
      appearance: none;
      margin-bottom: 1rem;
    }

    input:focus { outline: none; border-color: #111; }

    /* Custom dropdown */
    .custom-select { position: relative; margin-bottom: 1rem; }

    .custom-select__trigger {
      width: 100%;
      padding: 0.7rem 2.25rem 0.7rem 0.85rem;
      border: 1.5px solid #e4e4e7;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #18181b;
      background: #fff;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .custom-select__trigger:focus { outline: none; border-color: #111; }
    .custom-select--open .custom-select__trigger { border-color: #111; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }

    .custom-select__trigger svg { flex-shrink: 0; transition: transform .15s; }
    .custom-select--open .custom-select__trigger svg { transform: rotate(180deg); }

    .custom-select__trigger span { color: #a1a1aa; }
    .custom-select__trigger span.selected { color: #18181b; }

    .custom-select__options {
      display: none;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #fff;
      border: 1.5px solid #111;
      border-top: none;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
      z-index: 10;
      max-height: 220px;
      overflow-y: auto;
    }

    .custom-select--open .custom-select__options { display: block; }

    .custom-select__option {
      padding: 0.7rem 0.85rem;
      font-size: 0.95rem;
      color: #18181b;
      cursor: pointer;
    }

    .custom-select__option:hover { background: #f4f4f5; }
    .custom-select__option--active { background: #f4f4f5; font-weight: 600; }

    .phone-wrap {
      display: flex;
      align-items: stretch;
      border: 1.5px solid #e4e4e7;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }

    .phone-wrap:focus-within { border-color: #111; }

    .phone-prefix {
      padding: 0.7rem 0.75rem 0.7rem 0.85rem;
      font-size: 0.95rem;
      color: #71717a;
      background: #f4f4f5;
      border-right: 1.5px solid #e4e4e7;
      white-space: nowrap;
      user-select: none;
    }

    .phone-wrap input {
      border: none;
      border-radius: 0;
      margin-bottom: 0;
      background: transparent;
      flex: 1;
      padding: 0.7rem 0.85rem;
      font-size: 0.95rem;
      color: #18181b;
    }

    .phone-wrap input:focus { outline: none; }

    .sign-in-btn {
      width: 100%;
      padding: 0.8rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    .sign-in-btn:active { opacity: 0.85; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 0.65rem 0.75rem;
      color: #dc2626;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="logo">Queue Light</div>
  <div class="sub">Staff access</div>

  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}

      <label>Business</label>
      <input type="hidden" id="biz_slug" name="slug" value="{{ selected_slug }}">
      <div class="custom-select" id="biz_select_wrap">
        <button type="button" class="custom-select__trigger" id="biz_trigger" aria-haspopup="listbox">
          <span id="biz_label">— select —</span>
          <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1l5 5 5-5" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="custom-select__options" role="listbox" id="biz_options">
          {% for biz, code in businesses_with_codes %}
          <div class="custom-select__option{% if biz.slug == selected_slug %} custom-select__option--active{% endif %}"
               role="option" data-value="{{ biz.slug }}" data-code="{{ code }}">{{ biz.name }}</div>
          {% endfor %}
        </div>
      </div>

      <label for="id_phone">Your phone number</label>
      <div class="phone-wrap">
        <span class="phone-prefix" id="phone_prefix">+1</span>
        <input type="tel" id="id_phone" name="phone"
               autocomplete="tel" placeholder="416 555 0100" required>
      </div>

      <button class="sign-in-btn" type="submit">Sign in</button>
    </form>
  </div>

  <script>
    const wrap = document.getElementById("biz_select_wrap");
    const trigger = document.getElementById("biz_trigger");
    const label = document.getElementById("biz_label");
    const hiddenInput = document.getElementById("biz_slug");
    const pfx = document.getElementById("phone_prefix");
    const options = document.querySelectorAll(".custom-select__option");

    // Restore selection if slug pre-selected
    const preselected = hiddenInput.value;
    if (preselected) {
      const match = [...options].find(o => o.dataset.value === preselected);
      if (match) {
        label.textContent = match.textContent;
        label.classList.add("selected");
        pfx.textContent = "+" + match.dataset.code;
      }
    }

    trigger.addEventListener("click", () => {
      wrap.classList.toggle("custom-select--open");
    });

    options.forEach(opt => {
      opt.addEventListener("click", () => {
        options.forEach(o => o.classList.remove("custom-select__option--active"));
        opt.classList.add("custom-select__option--active");
        hiddenInput.value = opt.dataset.value;
        label.textContent = opt.textContent;
        label.classList.add("selected");
        pfx.textContent = "+" + opt.dataset.code;
        wrap.classList.remove("custom-select--open");
      });
    });

    // Close on outside click
    document.addEventListener("click", e => {
      if (!wrap.contains(e.target)) wrap.classList.remove("custom-select--open");
    });

    // Validate on submit
    document.querySelector("form").addEventListener("submit", e => {
      if (!hiddenInput.value) {
        e.preventDefault();
        trigger.focus();
        wrap.classList.add("custom-select--open");
      }
    });
  </script>
</body>
</html>
