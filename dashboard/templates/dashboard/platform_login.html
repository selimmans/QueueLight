<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform — Queue Light</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .logo { font-size: 1.3rem; font-weight: 800; color: #111; margin-bottom: 0.25rem; }
    .sub  { font-size: 0.85rem; color: #6b7280; margin-bottom: 2rem; }
    label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
    input {
      width: 100%; padding: 0.65rem 0.75rem;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 0.95rem; margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #6366f1; }
    button {
      width: 100%; padding: 0.75rem;
      background: #6366f1; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .error {
      background: #fef2f2; border: 1.5px solid #fca5a5;
      border-radius: 8px; padding: 0.65rem 0.75rem;
      color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Queue Light</div>
    <div class="sub">Platform admin</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
