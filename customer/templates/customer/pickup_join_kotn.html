{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kotn Cup 26 — Build your kit</title>
  <link rel="preload" as="font" type="font/woff2" href="{% static 'customer/kotn/fonts/Anton.woff2' %}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{% static 'customer/kotn/fonts/Staatliches.woff2' %}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{% static 'customer/kotn/fonts/Inter-variable.woff2' %}" crossorigin>
  <style>
    @font-face {
      font-family: 'Anton';
      src: url('{% static "customer/kotn/fonts/Anton.woff2" %}') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Staatliches';
      src: url('{% static "customer/kotn/fonts/Staatliches.woff2" %}') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('{% static "customer/kotn/fonts/Inter-variable.woff2" %}') format('woff2');
      font-weight: 100 900;
      font-display: swap;
    }
    @font-face {
      font-family: 'Sohne Dreiviertelfett';
      src: url('{% static "customer/kotn/TestSohne-Dreiviertelfett.otf" %}') format('opentype');
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f0e4; font-family: 'Inter', sans-serif; color: #2a1e18; }
    a { color: #a82a30; }
    input::placeholder { color: #b3a486; }
    .wrap { max-width: 460px; margin: 0 auto; padding: 44px 22px 70px; }
    .rule { height: 1px; background: #d8cba8; margin: 34px 0 8px; }
    .rule-tight { height: 1px; background: #d8cba8; margin: 32px 0 22px; }
    .summary-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; background: none; border: none; border-top: 1px solid #d8cba8; padding: 16px 2px; cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; }
    .row-btn { display: flex; align-items: center; gap: 14px; width: 100%; background: none; border: none; border-top: 1px solid #d8cba8; padding: 12px 2px; cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; }
    .row-num { font-family: 'Staatliches', sans-serif; font-size: 20px; width: 26px; color: #c9b98f; }
    .row-btn.active .row-num { color: #a82a30; }
    .row-crest { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; }
    .row-label { flex: 1; font-size: 16px; font-weight: 500; color: #5a4a3a; }
    .row-btn.active .row-label { font-weight: 700; color: #2a1e18; }
    .row-check { font-size: 16px; color: #a82a30; opacity: 0; }
    .row-btn.active .row-check { opacity: 1; }
    .sleeve-btn { flex: 1; background: none; border: none; border-bottom: 2px solid #d8cba8; padding: 12px 0; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #8a7860; }
    .sleeve-btn.active { border-bottom-color: #a82a30; font-weight: 800; color: #2a1e18; }
    .size-btn { min-width: 48px; background: none; border: 1.5px solid #d8cba8; padding: 10px 4px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #8a7860; }
    .size-btn.active { border-color: #a82a30; font-weight: 800; color: #2a1e18; background: #faf5f0; }
    #nameInput { width: 100%; background: none; border: none; border-bottom: 2px solid #a82a30; padding: 10px 0 14px; font-size: 32px; font-family: 'Sohne Dreiviertelfett', 'Staatliches', sans-serif; letter-spacing: 0.02em; color: #2a1e18; text-transform: uppercase; text-align: center; outline: none; }
    #addBtn { width: 100%; margin-top: 18px; background: none; border: 2px solid #a82a30; color: #a82a30; padding: 14px; font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: 'Inter', sans-serif; }
    #addBtn.disabled { border-color: #d8cba8; color: #a89876; cursor: not-allowed; }
    #continueBtn { width: 100%; margin-top: 14px; background: #a82a30; color: #f6f0e4; border: none; padding: 19px; font-size: 14px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; font-family: 'Inter', sans-serif; }
    #continueBtn.disabled { background: #d8cba8; color: #a89876; cursor: not-allowed; }
    .back-link { background: none; border: none; padding: 0; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #a82a30; margin-bottom: 26px; }
    #phoneInput { width: 100%; background: none; border: none; border-bottom: 2px solid #d8cba8; padding: 10px 0 14px; font-size: 18px; font-family: 'Inter', sans-serif; font-weight: 600; color: #2a1e18; text-align: center; margin-bottom: 38px; outline: none; }
    #phoneInput:focus { border-bottom-color: #a82a30; }
    #submitBtn { width: 100%; background: #d8cba8; color: #a89876; border: none; padding: 19px; font-size: 14px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; cursor: not-allowed; font-family: 'Inter', sans-serif; }
    #submitBtn.ready { background: #a82a30; color: #f6f0e4; cursor: pointer; }
    .global-error { background: #fbe4e2; border: 1px solid #e6a9a3; border-radius: 6px; padding: 12px 14px; color: #a82a30; font-size: 13px; margin-bottom: 26px; }
    .step { display: none; }
    .step.active { display: block; }
    #maxPatchNote { font-size: 12px; color: #8a7860; font-style: italic; margin-top: 12px; display: none; }
  </style>
</head>
<body>
<div class="wrap">

  <div style="display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:10px;">
    <img src="{% static 'customer/kotn/kotn-cup26-wordmark.png' %}" alt="Kotn Cup 26" style="width:190px;" />
    <div style="display:flex; align-items:center; gap:10px; margin-top:2px;">
      <div style="height:1px; width:22px; background:#eac672;"></div>
      <div style="font-size:11px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#8f6a28;">Custom Kit Counter</div>
      <div style="height:1px; width:22px; background:#eac672;"></div>
    </div>
  </div>

  {% if global_error %}
    <div class="global-error">{{ global_error }}</div>
  {% endif %}

  <form method="post" id="kotn-form">
    {% csrf_token %}
    <input type="hidden" name="shirts" id="shirtsInput">
    <input type="hidden" name="phone" id="phoneHidden">

    <div class="step active" id="stepShirts">
      <div class="rule"></div>
      <div id="shirtsContainer"></div>
      <button type="button" id="addBtn" class="disabled">+ Add Another Shirt</button>
      <button type="button" id="continueBtn" class="disabled">Finish This Shirt First</button>
    </div>

    <div class="step" id="stepPhone">
      <button type="button" class="back-link" id="backBtn">&larr; Edit Shirts</button>
      <div style="font-family:'Anton',sans-serif; font-size:20px; letter-spacing:0.02em; margin-bottom:14px;">Your Order</div>
      <div id="orderSummary"></div>
      <div style="height:1px; background:#d8cba8; margin:30px 0 26px;"></div>
      <div style="font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#8f6a28; margin-bottom:10px;">Your Phone</div>
      <div style="font-size:12px; color:#8a7860; margin-bottom:16px;">We'll text you the moment it's ready.</div>
      <input id="phoneInput" type="tel" placeholder="(416) 555-0134" autocomplete="tel">
      <button type="submit" id="submitBtn">Add Your Phone</button>
    </div>
  </form>

</div>

<template id="patchRowTemplate">
  <button type="button" class="row-btn" data-key="">
    <div class="row-num"></div>
    <img class="row-crest" src="" alt="">
    <div class="row-label"></div>
    <div class="row-check">&#10003;</div>
  </button>
</template>

<script>
  const KOTN_PATCHES = [
    {% for p in kotn_patches %}{ key: "{{ p.key }}", name: "{{ p.name|escapejs }}", crest: "{{ p.crest }}" }{% if not forloop.last %},{% endif %}{% endfor %}
  ];
  const KOTN_SIZES = [
    {% for s in kotn_sizes %}{ key: "{{ s.key }}", name: "{{ s.name|escapejs }}" }{% if not forloop.last %},{% endif %}{% endfor %}
  ];
  const KOTN_GARMENT_SIZES = [
    {% for s in kotn_garment_sizes %}{ key: "{{ s.key }}", name: "{{ s.name|escapejs }}" }{% if not forloop.last %},{% endif %}{% endfor %}
  ];
  const MAX_LEN = {{ name_max_length }};
  const MAX_PATCHES = {{ kotn_patch_max_per_shirt }};
  const CREST_BASE = "{% static 'customer/kotn/' %}";

  let shirts = [{ patches: [], sleeve: "short-sleeve", size: "m", name: "" }];
  let activeIndex = 0;

  function isValid(shirt) {
    return shirt.patches.length > 0 && shirt.name.trim().length > 0;
  }
  function allValid() {
    return shirts.every(isValid);
  }
  function summaryText(shirt) {
    const patchNames = shirt.patches.map(k => KOTN_PATCHES.find(p => p.key === k).name).join(" + ");
    const sleeveName = KOTN_SIZES.find(s => s.key === shirt.sleeve).name;
    const sizeName = KOTN_GARMENT_SIZES.find(s => s.key === shirt.size).name;
    return `${patchNames || "No patch"} · ${sleeveName} · ${sizeName}${shirt.name ? " · " + shirt.name : ""}`;
  }

  function renderShirts() {
    const container = document.getElementById("shirtsContainer");
    container.innerHTML = "";

    shirts.forEach((shirt, idx) => {
      if (idx !== activeIndex) {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "summary-row";
        row.innerHTML = `
          <div style="font-size:14px; color:#5a4a3a; line-height:1.4;">Shirt ${idx + 1}: ${summaryText(shirt)}</div>
          <div style="font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#a82a30; font-weight:800; flex-shrink:0;">Edit</div>
        `;
        row.addEventListener("click", () => { activeIndex = idx; renderShirts(); });
        container.appendChild(row);
        return;
      }

      const block = document.createElement("div");
      block.style.paddingTop = "22px";
      block.innerHTML = `
        <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:4px;">
          <div style="font-family:'Anton',sans-serif; font-size:22px; letter-spacing:0.02em;">Shirt ${idx + 1}</div>
          ${shirts.length > 1 ? '<button type="button" class="removeBtn" style="background:none; border:none; padding:4px; cursor:pointer; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#8a7860; font-family:\'Inter\',sans-serif;">Remove</button>' : ""}
        </div>
        <div class="rule-tight"></div>
        <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:18px;">
          <div style="font-family:'Anton',sans-serif; font-size:18px; letter-spacing:0.02em;">Pick Your Patch</div>
          <div style="font-size:12px; font-weight:600; color:#8a7860;">(Up to ${MAX_PATCHES})</div>
        </div>
        <div class="patchList"></div>
        <div class="maxPatchNote" id="maxPatchNote" style="font-size:12px; color:#8a7860; font-style:italic; margin-top:12px; display:none;">Deselect one to choose another.</div>
        <div class="rule-tight"></div>
        <div style="font-family:'Anton',sans-serif; font-size:18px; letter-spacing:0.02em; margin-bottom:16px;">Sleeve Length</div>
        <div class="sleeveRow" style="display:flex; gap:0;"></div>
        <div class="rule-tight"></div>
        <div style="font-family:'Anton',sans-serif; font-size:18px; letter-spacing:0.02em; margin-bottom:16px;">Size</div>
        <div class="sizeRow" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
        <div class="rule-tight"></div>
        <div style="font-family:'Anton',sans-serif; font-size:18px; letter-spacing:0.02em; margin-bottom:6px;">Name For The Back</div>
        <div style="font-size:12px; color:#8a7860; margin-bottom:18px;">(max ${MAX_LEN} letters)</div>
        <input id="nameInput" type="text" placeholder="HELALI" maxlength="${MAX_LEN}" autocomplete="off">
      `;
      container.appendChild(block);

      const patchListEl = block.querySelector(".patchList");
      KOTN_PATCHES.forEach((p, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "row-btn" + (shirt.patches.includes(p.key) ? " active" : "");
        btn.innerHTML = `
          <div class="row-num">${String(i + 1).padStart(2, "0")}</div>
          <img class="row-crest" src="${CREST_BASE}${p.crest}" alt="${p.name}">
          <div class="row-label">${p.name}</div>
          <div class="row-check">&#10003;</div>
        `;
        btn.addEventListener("click", () => {
          if (shirt.patches.includes(p.key)) {
            shirt.patches = shirt.patches.filter(k => k !== p.key);
          } else if (shirt.patches.length < MAX_PATCHES) {
            shirt.patches.push(p.key);
          }
          renderShirts();
        });
        patchListEl.appendChild(btn);
      });
      block.querySelector("#maxPatchNote").style.display = shirt.patches.length >= MAX_PATCHES ? "block" : "none";

      const sleeveRow = block.querySelector(".sleeveRow");
      KOTN_SIZES.forEach(s => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "sleeve-btn" + (shirt.sleeve === s.key ? " active" : "");
        btn.textContent = s.name;
        btn.addEventListener("click", () => { shirt.sleeve = s.key; renderShirts(); });
        sleeveRow.appendChild(btn);
      });

      const sizeRow = block.querySelector(".sizeRow");
      KOTN_GARMENT_SIZES.forEach(gs => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "size-btn" + (shirt.size === gs.key ? " active" : "");
        btn.textContent = gs.name;
        btn.addEventListener("click", () => { shirt.size = gs.key; renderShirts(); });
        sizeRow.appendChild(btn);
      });

      const nameInput = block.querySelector("#nameInput");
      nameInput.value = shirt.name;
      nameInput.addEventListener("input", () => {
        shirt.name = nameInput.value.toUpperCase().replace(/[^A-Z0-9 ]/g, "").slice(0, MAX_LEN);
        nameInput.value = shirt.name;
        updateButtons();
      });

      const removeBtn = block.querySelector(".removeBtn");
      if (removeBtn) {
        removeBtn.addEventListener("click", () => {
          shirts.splice(idx, 1);
          activeIndex = Math.max(0, idx - 1);
          renderShirts();
        });
      }
    });

    updateButtons();
  }

  function updateButtons() {
    const addBtn = document.getElementById("addBtn");
    const continueBtn = document.getElementById("continueBtn");
    const activeValid = isValid(shirts[activeIndex]);
    addBtn.classList.toggle("disabled", !activeValid);
    const everyValid = allValid();
    continueBtn.classList.toggle("disabled", !everyValid);
    continueBtn.textContent = everyValid ? "Continue to Phone" : "Finish This Shirt First";
  }

  document.getElementById("addBtn").addEventListener("click", () => {
    if (!isValid(shirts[activeIndex])) return;
    shirts.push({ patches: [], sleeve: "short-sleeve", size: "m", name: "" });
    activeIndex = shirts.length - 1;
    renderShirts();
  });

  document.getElementById("continueBtn").addEventListener("click", () => {
    if (!allValid()) return;
    renderOrderSummary();
    document.getElementById("stepShirts").classList.remove("active");
    document.getElementById("stepPhone").classList.add("active");
  });

  document.getElementById("backBtn").addEventListener("click", () => {
    document.getElementById("stepPhone").classList.remove("active");
    document.getElementById("stepShirts").classList.add("active");
  });

  function renderOrderSummary() {
    const el = document.getElementById("orderSummary");
    el.innerHTML = shirts.map((shirt, idx) => {
      const crests = shirt.patches.map(k => KOTN_PATCHES.find(p => p.key === k)).map(p => `
        <img src="${CREST_BASE}${p.crest}" alt="${p.name}" style="width:46px; height:46px; object-fit:contain; flex-shrink:0;">
      `).join("");
      return `
      <div class="summary-row" style="align-items:center;">
        <div style="font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:#8a7860; flex-shrink:0;">Shirt ${idx + 1}</div>
        <div style="display:flex; align-items:center; justify-content:flex-end; gap:12px;">
          <div style="display:flex; gap:6px; flex-shrink:0;">${crests}</div>
          <div style="font-size:14px; font-weight:700; text-align:right;">${summaryText(shirt)}</div>
        </div>
      </div>
    `;
    }).join("");
  }

  const phoneInput = document.getElementById("phoneInput");
  const submitBtn = document.getElementById("submitBtn");
  const form = document.getElementById("kotn-form");

  function validatePhone() {
    const digits = phoneInput.value.replace(/\D/g, "");
    const ok = digits.length === 10;
    submitBtn.classList.toggle("ready", ok);
    submitBtn.textContent = ok ? "Place My Order" : "Add Your Phone";
    return ok;
  }
  phoneInput.addEventListener("input", () => {
    const digits = phoneInput.value.replace(/\D/g, "").slice(0, 10);
    let formatted = digits;
    if (digits.length > 6) formatted = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
    else if (digits.length > 3) formatted = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
    else if (digits.length > 0) formatted = `(${digits}`;
    phoneInput.value = formatted;
    validatePhone();
  });

  form.addEventListener("submit", (e) => {
    if (!validatePhone() || !allValid()) {
      e.preventDefault();
      return;
    }
    document.getElementById("phoneHidden").value = phoneInput.value;
    document.getElementById("shirtsInput").value = JSON.stringify(shirts);
  });

  renderShirts();
</script>
</body>
</html>
